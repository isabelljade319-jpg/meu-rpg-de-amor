<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 Pixel Love Adventure</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }

  :root {
    --pink: #ff6b9d;
    --red: #e8003a;
    --purple: #9b59b6;
    --dark: #0a0014;
    --gold: #ffd700;
    --white: #fff0f5;
    --cyan: #00e5ff;
  }

  body {
    background: var(--dark);
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    width: 100vw; height: 100vh;
    cursor: crosshair;
  }

  /* ===== STARRY SKY ===== */
  #sky {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, #1a0030 0%, #0a0014 60%);
    z-index: 0;
    overflow: hidden;
  }

  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
    opacity: var(--op);
  }
  .star.big { box-shadow: 0 0 4px 2px rgba(255,200,255,0.6); }

  @keyframes twinkle {
    0%,100% { transform: scale(1); opacity: var(--op); }
    50% { transform: scale(1.8); opacity: 1; }
  }

  .shooting-star {
    position: absolute;
    width: 3px; height: 3px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 6px 2px white, 20px 0 8px white, 40px 0 6px rgba(255,255,255,0.5);
    animation: shoot 2s linear forwards;
    opacity: 0;
  }
  @keyframes shoot {
    0% { opacity:1; transform: translate(0,0); }
    100% { opacity:0; transform: translate(-300px, 150px); }
  }

  /* ===== MAIN CONTAINER ===== */
  #game-container {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  /* ===== SCREENS ===== */
  .screen {
    display: none;
    position: absolute;
    width: min(700px, 96vw);
    background: rgba(10,0,20,0.92);
    border: 4px solid var(--pink);
